# Firefly-skill configuration — July 2026 cycle (Ji Li, Singapore entry-level)
# Browser driven by browser-harness this cycle (browser-act unreachable); the
# browser: block below is kept for when browser-act comes back.

browser:
  name: "linkedin-jobhunt"
  session: "ljh"               # used by the browser-act driver / browser fallback

pipeline:
  driver: "harness"            # harness | act | direct  (env FIREFLY_DRIVER overrides)
  max_cards_per_query: 200     # paging cap per search query (guest pages are 10 cards)
  cards_interval: [1.4, 2.2]   # seconds between card-page fetches
  detail_fetch_interval: [1.0, 1.6]
  detail_chunk_size: 250       # details per worker subprocess (resumable across chunks)
  recheck_max_age_hours: 4     # skip the pre-build liveness re-ping if details are fresher
  recheck_interval: [0.8, 1.4]

profile:
  candidate: "Ji Li — NUS fresh grad in Singapore, intern-level experience; targets two tracks:
    (A) entry/associate product management, business/data analyst, AI/GenAI ops roles;
    (B) digital/growth/performance marketing, social & content, influencer/creator partnerships.
    Comfortable with SQL, Python, dashboards, prompt/LLM tooling; open to contract roles."
  tracks:
    track_a:
      keywords: [product manager, associate product manager, product owner, product operations,
                 AI product, LLM, GenAI, automation, internal tooling, roadmap,
                 business analyst, data analyst, SQL, python, dashboards, Power BI,
                 market intelligence, competitive analysis, strategy, operations analyst]
    track_b:
      keywords: [digital marketing, growth marketing, performance marketing, paid media,
                 social media, content strategy, content marketing, copywriting,
                 influencer, KOL, creator partnerships, affiliate marketing,
                 e-commerce, campaign management, SEO, SEM, CRM, marketing analytics,
                 public relations, communications, community]

search:
  location_label: "Singapore"
  geo_id: "102454443"
  experience: "2,3"            # Entry + Associate (same as the June cycle)
  recency: "r604800"           # past week — June cycle already covered postings up to ~06-24
  sort: "DD"
  scroll_rounds: 3
  queries:
    - "Associate Product Manager"
    - "AI Product Manager"
    - "Product Manager"
    - "Business Analyst"
    - "Data Analyst"
    - "Digital Marketing"
    - "Growth Marketing"
    - "Social Media Executive"
    - "Marketing Associate"
    - "Content Marketing"
    - "Strategy Analyst"

filters:
  max_years_exclusive: 3
  require_singapore: true
  drop_direct_sales_mlm: true
  drop_contract: false         # June cycle showed the user applies to contract roles too
  drop_part_time: false
  drop_removed: true
  drop_closed: true
  fast_close_hours: 48
  blacklist_companies: []
  blacklist_titles: []

exclusion_sources:
  # Every job surfaced in the June cycle (v3 837 + v2/AnalystAI + 54 first-cycle applied),
  # so nothing already applied to (112 + 54) — or even previously shortlisted — reappears.
  - "D:\\ClaudeData\\Job Search July\\june_seen_jobs.csv"

output:
  dir: "D:\\ClaudeData\\Job Search July"
  basename: "SG_LinkedIn_Jobs_July2026"
  template_style: "v3"

scoring:
  mode: "agent"
