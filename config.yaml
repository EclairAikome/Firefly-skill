# Firefly-skill configuration  --  this is the only file you normally edit.
# Everything below is an EXAMPLE. Customize it to your own job hunt.

browser:
  name: "linkedin-jobhunt"      # reused across runs; created once via browser-act
  session: "ljh"               # browser-act session name for this skill

profile:
  # A one-line description of yourself, used by the agent to judge fit.
  candidate: "<e.g. new grad in Singapore, intern-level experience, targeting the two tracks below>"
  tracks:
    track_a:
      keywords: [product manager, associate product manager, AI product, LLM, automation,
                 internal tooling, product ownership, roadmap, SQL, python, data]
    track_b:
      keywords: [affiliate marketing, influencer, KOL, creator partnerships, growth marketing,
                 performance marketing, competitive analysis, content strategy, social, digital marketing]

search:
  location_label: "Singapore"
  geo_id: "102454443"          # LinkedIn geoId. 102454443 = Singapore. Change for your city/country.
  experience: "2,3"            # f_E: 1=Intern 2=Entry 3=Associate 4=Mid-Senior 5=Director 6=Exec
  recency: "r2592000"          # f_TPR: r604800=past week, r2592000=past month
  sort: "DD"                   # DD = most recent
  scroll_rounds: 2             # times to scroll each results page before extracting
  queries:                     # one LinkedIn search per line -- use your own target titles
    - "Associate Product Manager"
    - "AI Product Manager"
    - "Growth Marketing"
    - "Digital Marketing Executive"

filters:
  max_years_exclusive: 3       # drop a job if its minimum required experience is >= this
  require_singapore: true      # drop roles not based/operating in your location
  drop_direct_sales_mlm: true  # drop Organisation / Marketing Group direct-sales/MLM roles
  drop_contract: false         # drop fixed-term / contract / temporary roles (off by default)
  drop_part_time: false        # drop part-time roles (off by default)
  drop_removed: true           # drop dead listings (404 / "job posting has been removed")
  drop_closed: true            # drop closed listings ("no longer accepting applications")
  fast_close_hours: 48         # a listing closed within this many hours of posting = ghost -> drop
  blacklist_companies:         # hard-drop these employers outright (case-insensitive substring of the company name)
    # - "Some Volunteer Org"    # e.g. pay-to-"volunteer" travel placements the applicant pays for
    # - "Acme Financial"        # e.g. commission-only financial-advisory / insurance recruitment
  blacklist_titles:            # hard-drop these title patterns outright (whole-word match, case-insensitive)
    # - "Volunteer"             #   whole-word: 'IT Specialist' will NOT match 'Credit Specialist'
    # - "Sales Associate"       # e.g. retail floor roles off your track
    # - "Office Administrator"
  # No top-N cap: every job that passes the rules above is kept, sorted by fit score.

exclusion_sources:
  # Optional. Paths to past application logs (CSV with Company, Title, URL columns) to dedupe
  # against, on top of the skill's own persistent master library. Example:
  # - "C:\\path\\to\\your\\past_applications.csv"

output:
  dir: "C:\\path\\to\\your\\output\\folder"   # where the dated .xlsx is written
  basename: "LinkedIn_Matches"                # final file: <basename>_<YYYY-MM-DD>.xlsx
  template_style: "v3"

scoring:
  mode: "agent"                # agent = the agent judges fit in context; heuristic = keyword-overlap fallback
